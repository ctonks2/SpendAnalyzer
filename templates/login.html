<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spend Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 60px auto;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-secondary);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .auth-tab.active {
            background: var(--accent);
            color: var(--bg-primary);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .auth-btn:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-glow);
        }
        .error-message {
            background: rgba(255, 77, 106, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            text-align: center;
        }
        .success-message {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>💰 Spend Analyzer</h1>
                <p>Track your spending, get AI insights</p>
            </div>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            {% if success %}
            <div class="success-message">{{ success }}</div>
            {% endif %}
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showForm('login')">Sign In</button>
                <button class="auth-tab" onclick="showForm('signup')">Create Account</button>
            </div>
            
            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="action" value="login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            
            <!-- Signup Form -->
            <form class="auth-form" id="signupForm" method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="action" value="signup">
                <div class="form-group">
                    <label>Choose a Username</label>
                    <input type="text" name="username" required placeholder="Pick a username">
                </div>
                <div class="form-group">
                    <label>Choose a Password</label>
                    <input type="password" name="password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
            </form>
        </div>
    </div>
    
    <script>
        function showForm(formType) {
            document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if (formType === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        }
    </script>
</body>
</html>
